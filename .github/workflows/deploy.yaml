name: Deploy to Server

on:
  workflow_run:
    workflows: ["Run tests"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Secrets presence
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then echo "HOST IS EMPTY"; fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then echo "SERVER USER IS EMPTY"; fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then echo "SERVER SSH KEY IS EMPTY"; fi

